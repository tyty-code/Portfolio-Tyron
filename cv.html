<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes CV — Tyron Raymond</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f; --bg-card: #16161f; --border: #27272a;
      --text: #f4f4f5; --text-sec: #a1a1aa; --text-muted: #71717a;
      --accent: #60a5fa; --accent-light: rgba(59,130,246,0.1);
      --grad-a: #60a5fa; --grad-b: #818cf8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { text-decoration: none; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); }
    .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; }
    .brand span { color: var(--accent); }
    .back { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-sec); border: 1.5px solid var(--border); padding: 0.5rem 1rem; border-radius: 9999px; transition: all .3s; }
    .back:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .header { text-align: center; padding: 3rem 1.5rem 2.5rem; }
    .header h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 800; background: linear-gradient(135deg, var(--grad-a), var(--grad-b)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; max-width: 900px; margin: 0 auto; padding: 0 1.5rem 4rem; }
    .cv-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; transition: all .3s; }
    .cv-card:hover { border-color: var(--accent); box-shadow: 0 0 30px -10px rgba(96,165,250,.2); }
    .cv-card.pending { opacity: 0.45; }
    .cv-left { display: flex; align-items: center; gap: 0.875rem; min-width: 0; }
    .cv-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--accent-light); border: 1px solid rgba(96,165,250,.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cv-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.9375rem; color: var(--text); line-height: 1.3; }
    .cv-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; font-family: 'DM Mono', monospace; }
    .btn-dl { flex-shrink: 0; display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 500; background: linear-gradient(135deg, var(--grad-a), var(--grad-b)); color: white; transition: all .3s; box-shadow: 0 4px 12px -4px rgba(96,165,250,.3); }
    .btn-dl:hover { transform: translateY(-1px); box-shadow: 0 6px 18px -4px rgba(96,165,250,.4); }
    .badge-soon { flex-shrink: 0; font-size: 0.7rem; padding: 0.3rem 0.75rem; border-radius: 9999px; background: rgba(113,113,122,.12); color: var(--text-muted); font-family: 'DM Mono', monospace; }
    .icon-doc { fill: none; stroke: var(--accent); stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <nav>
    <span class="brand">TR<span>.</span></span>
    <a href="index.html" class="back">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
  </nav>

  <div class="header"><h1>Mes CV</h1></div>

  <div class="grid">

    <div class="cv-card">
      <div class="cv-left">
        <div class="cv-icon"><svg viewBox="0 0 24 24" width="20" height="20"><path class="icon-doc" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
        <div>
          <div class="cv-name">CV — BTS SIO SISR</div>
          <div class="cv-sub">Réseau · Cybersécurité · Admin sys</div>
        </div>
      </div>
      <a href="Tyron-Raymond-cv.pdf" download="Tyron-Raymond-cv.pdf" class="btn-dl">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PDF
      </a>
    </div>

    <div class="cv-card pending">
      <div class="cv-left">
        <div class="cv-icon"><svg viewBox="0 0 24 24" width="20" height="20"><path class="icon-doc" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
        <div>
          <div class="cv-name">CV — À ajouter</div>
          <div class="cv-sub">Votre 2ème CV ici</div>
        </div>
      </div>
      <span class="badge-soon">Bientôt</span>
    </div>

    <div class="cv-card pending">
      <div class="cv-left">
        <div class="cv-icon"><svg viewBox="0 0 24 24" width="20" height="20"><path class="icon-doc" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
        <div>
          <div class="cv-name">CV — À ajouter</div>
          <div class="cv-sub">Votre 3ème CV ici</div>
        </div>
      </div>
      <span class="badge-soon">Bientôt</span>
    </div>

  </div>

</body>
</html>
